# Cleanup Workflow for Primer Seek Property Platform
# Automated cleanup of old artifacts, caches, and workflow runs to manage storage costs

name: Cleanup

on:
  # Run weekly on Sundays at 2 AM UTC
  schedule:
    - cron: '0 2 * * 0'

  # Manual trigger for immediate cleanup
  workflow_dispatch:
    inputs:
      cleanup_type:
        description: 'Type of cleanup to perform'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - artifacts
          - caches
          - workflow-runs

permissions:
  actions: write
  contents: read

jobs:
  cleanup-artifacts:
    name: Cleanup Old Artifacts
    runs-on: ubuntu-latest
    if: github.event.inputs.cleanup_type == 'all' || github.event.inputs.cleanup_type == 'artifacts' || github.event.inputs.cleanup_type == ''

    steps:
      - name: Cleanup old artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            // Get artifacts older than 30 days
            const thirtyDaysAgo = new Date();
            thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);

            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner,
              repo,
              per_page: 100
            });

            let deletedCount = 0;

            for (const artifact of artifacts.data.artifacts) {
              const createdAt = new Date(artifact.created_at);

              if (createdAt < thirtyDaysAgo) {
                try {
                  await github.rest.actions.deleteArtifact({
                    owner,
                    repo,
                    artifact_id: artifact.id
                  });
                  console.log(`Deleted artifact: ${artifact.name} (${artifact.id})`);
                  deletedCount++;
                } catch (error) {
                  console.log(`Failed to delete artifact ${artifact.id}: ${error.message}`);
                }
              }
            }

            console.log(`Cleanup completed. Deleted ${deletedCount} old artifacts.`);

  cleanup-caches:
    name: Cleanup Old Caches
    runs-on: ubuntu-latest
    if: github.event.inputs.cleanup_type == 'all' || github.event.inputs.cleanup_type == 'caches' || github.event.inputs.cleanup_type == ''

    steps:
      - name: Cleanup old caches
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            // Get all caches
            const caches = await github.rest.actions.getActionsCacheList({
              owner,
              repo,
              per_page: 100
            });

            // Delete caches older than 7 days or for closed PRs
            const sevenDaysAgo = new Date();
            sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);

            let deletedCount = 0;

            for (const cache of caches.data.actions_caches) {
              const lastAccessedAt = new Date(cache.last_accessed_at);
              const shouldDelete = lastAccessedAt < sevenDaysAgo ||
                                 cache.ref.startsWith('refs/pull/') ||
                                 cache.ref === 'refs/heads/feature/cleanup';

              if (shouldDelete) {
                try {
                  await github.rest.actions.deleteActionsCacheById({
                    owner,
                    repo,
                    cache_id: cache.id
                  });
                  console.log(`Deleted cache: ${cache.key} (${cache.id})`);
                  deletedCount++;
                } catch (error) {
                  console.log(`Failed to delete cache ${cache.id}: ${error.message}`);
                }
              }
            }

            console.log(`Cache cleanup completed. Deleted ${deletedCount} old caches.`);

  cleanup-workflow-runs:
    name: Cleanup Old Workflow Runs
    runs-on: ubuntu-latest
    if: github.event.inputs.cleanup_type == 'all' || github.event.inputs.cleanup_type == 'workflow-runs' || github.event.inputs.cleanup_type == ''

    steps:
      - name: Cleanup old workflow runs
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            // Keep last 100 runs per workflow, delete older ones
            const workflows = await github.rest.actions.listRepoWorkflows({
              owner,
              repo
            });

            let totalDeleted = 0;

            for (const workflow of workflows.data.workflows) {
              const runs = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: workflow.id,
                per_page: 100,
                page: 2  // Skip first 100 runs
              });

              for (const run of runs.data.workflow_runs) {
                // Only delete completed runs older than 90 days
                const runDate = new Date(run.created_at);
                const ninetyDaysAgo = new Date();
                ninetyDaysAgo.setDate(ninetyDaysAgo.getDate() - 90);

                if (runDate < ninetyDaysAgo && ['completed', 'cancelled', 'failure'].includes(run.status)) {
                  try {
                    await github.rest.actions.deleteWorkflowRun({
                      owner,
                      repo,
                      run_id: run.id
                    });
                    console.log(`Deleted workflow run: ${run.id} from ${workflow.name}`);
                    totalDeleted++;
                  } catch (error) {
                    console.log(`Failed to delete run ${run.id}: ${error.message}`);
                  }
                }
              }
            }

            console.log(`Workflow run cleanup completed. Deleted ${totalDeleted} old runs.`);

  report-cleanup:
    name: Report Cleanup Results
    runs-on: ubuntu-latest
    needs: [cleanup-artifacts, cleanup-caches, cleanup-workflow-runs]
    if: always()

    steps:
      - name: Generate cleanup report
        run: |
          echo "# 🧹 Cleanup Report" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Status" >> $GITHUB_STEP_SUMMARY
          echo "| Task | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Artifacts | ${{ needs.cleanup-artifacts.result == 'success' && '✅ Completed' || needs.cleanup-artifacts.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Caches | ${{ needs.cleanup-caches.result == 'success' && '✅ Completed' || needs.cleanup-caches.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Workflow Runs | ${{ needs.cleanup-workflow-runs.result == 'success' && '✅ Completed' || needs.cleanup-workflow-runs.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next scheduled cleanup:** $(date -d 'next sunday 2:00' '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
